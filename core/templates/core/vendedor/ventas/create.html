{% extends 'core/base_dashboard.html' %}
{% block title %}Registrar Venta{% endblock %}
{% block content %}

<div class="max-w-4xl mx-auto mt-8">
  <h2 class="text-2xl font-bold text-green-400 mb-4">➕ Registrar Venta</h2>

  <form method="post">
    {% csrf_token %}

    <!-- Cliente -->
    <div class="mb-4 relative">
      <label class="block text-green-400 mb-2 font-semibold">🧍 Cliente</label>
      <input type="text" id="cliente-autocomplete" placeholder="Buscar cliente..."
             class="w-full p-2 bg-gray-900 border border-green-500 rounded text-white" autocomplete="off">
      <input type="hidden" name="cliente" id="cliente-id">
      <div id="cliente-sugerencias"
           class="hidden absolute w-full bg-zinc-800 border border-zinc-600 rounded mt-1 text-white z-50"></div>
    </div>

    <!-- Tipo de Pago -->
    <div class="mb-4">
      <label class="block text-green-400 mb-2 font-semibold">💳 Tipo de Pago</label>
      <select name="tipo_pago" required
              class="w-full p-2 bg-gray-900 border border-green-500 rounded text-white">
        <option value="" disabled selected>Seleccione una opción...</option>
        <option value="contado">Contado</option>
        <option value="credito">Crédito</option>
        <option value="transferencia">Transferencia</option>
        <option value="garantia">Garantía</option>
      </select>
    </div>

    <!-- Productos -->
    <div id="productos-container" class="space-y-4 mb-4"></div>
    <button type="button" id="agregar-producto"
            class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded">
      ➕ Agregar Producto
    </button>

    <!-- Descuento -->
    <div class="mt-4 mb-4 flex items-center space-x-2">
      <label class="text-green-400 font-semibold">🏷️ Descuento:</label>
      <input type="text" id="descuento-input" name="descuento"
             value="0" placeholder="0"
             class="w-1/3 p-2 bg-gray-900 border border-green-500 rounded text-white"
             oninput="formatMilesInput(this)">
    </div>
    <script>
      function formatMilesInput(el) {
        let only = el.value.replace(/\D/g,'');
        el.value = only.replace(/\B(?=(\d{3})+(?!\d))/g,'.');
      }
    </script>

    <!-- Total -->
    <div class="mt-4">
      <p class="text-green-300 font-bold text-lg">
        💵 Total: $<span id="total">0</span>
      </p>
    </div>

    <input type="hidden" name="productos_data" id="productos-data">

    <!-- Botón final -->
    <button type="submit"
            class="mt-6 bg-green-600 hover:bg-green-700 text-black font-bold px-4 py-2 rounded w-full">
      💾 Registrar e Imprimir
    </button>
  </form>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const fmt = n => new Intl.NumberFormat('de-DE').format(n);
  let idx = 0;
  const cont = document.getElementById("productos-container");
  const totEl = document.getElementById("total");
  const dataIn = document.getElementById("productos-data");
  const descIn = document.getElementById("descuento-input");

  // 1) Agregar línea
  document.getElementById("agregar-producto").addEventListener("click", () => {
    const d = document.createElement("div");
    d.className = "producto bg-zinc-800 p-4 rounded shadow-md";
    d.dataset.index = idx;
    d.innerHTML = `
      <div class="relative mb-2">
        <input type="text"
               class="producto-autocomplete w-full p-2 bg-gray-900 border border-green-500 rounded text-white"
               placeholder="Buscar producto..." data-index="${idx}" autocomplete="off">
        <input type="hidden" class="producto-id" data-index="${idx}">
        <div class="sugerencias-producto hidden absolute w-full bg-zinc-800 border border-zinc-600 rounded mt-1 z-50 text-white"></div>
      </div>
      <div class="flex items-center gap-2 mb-2">
        <input type="number" min="1" value="1"
               class="cantidad-input w-1/4 p-2 bg-gray-900 border border-green-500 rounded text-white"
               data-index="${idx}" placeholder="Cant.">
        <input type="number" min="0" value="0"
               class="precio-input w-1/4 p-2 bg-gray-900 border border-green-500 rounded text-white"
               data-index="${idx}" placeholder="Precio">
      </div>
      <div><span class="text-green-300 font-semibold">Subtotal: $<span class="subtotal" data-index="${idx}">0</span></span></div>
      <button type="button" class="remover-linea mt-2 text-red-400 hover:underline">Eliminar</button>
    `;
    cont.appendChild(d);
    idx++;
  });

  // 2) Recalcular
  function recalc() {
    let bruto = 0, arr = [];
    document.querySelectorAll(".producto").forEach(div => {
      const i    = div.dataset.index;
      const pid  = div.querySelector(`.producto-id[data-index="${i}"]`).value;
      const c    = parseInt(div.querySelector(`.cantidad-input[data-index="${i}"]`).value)||0;
      const p    = parseFloat(div.querySelector(`.precio-input[data-index="${i}"]`).value)||0;
      const sub  = c * p;
      div.querySelector(`.subtotal[data-index="${i}"]`).textContent = fmt(sub);
      if(pid && c>0) {
        bruto += sub;
        arr.push({ producto_id:pid, cantidad:c, precio:p });
      }
    });
    const desc = parseFloat(descIn.value.replace(/\./g,''))||0;
    const net  = Math.max(0, bruto - desc);
    totEl.textContent = fmt(net);
    dataIn.value = JSON.stringify(arr);
  }

  // 3) Delegar inputs
  document.addEventListener("input", e=>{
    if(e.target.matches(".cantidad-input")||
       e.target.matches(".precio-input")||
       e.target===descIn) {
      recalc();
    }
  });
  cont.addEventListener("click", e=>{
    if(e.target.matches(".remover-linea")) {
      e.target.closest(".producto").remove();
      recalc();
    }
  });

  // 4) Autocomplete cliente…
  document.getElementById("cliente-autocomplete").addEventListener("input", async function(){
    const q = this.value.trim(), lst = document.getElementById("cliente-sugerencias");
    if(q.length<2) return lst.classList.add("hidden");
    const res = await fetch(`/ajax/buscar-clientes/?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    lst.innerHTML="";
    data.forEach(c=>{
      const di = document.createElement("div");
      di.textContent = `${c.nombre} (${c.cedula})`;
      di.className = "p-2 hover:bg-zinc-700 cursor-pointer";
      di.onclick = ()=>{
        this.value = di.textContent;
        document.getElementById("cliente-id").value = c.id;
        lst.classList.add("hidden");
      };
      lst.appendChild(di);
    });
    lst.classList.remove("hidden");
  });

  // 5) Autocomplete producto…
  document.addEventListener("input", async e=>{
    if(!e.target.matches(".producto-autocomplete")) return;
    const q=e.target.value.trim(), idx=e.target.dataset.index;
    const lst=e.target.nextElementSibling.nextElementSibling;
    if(q.length<2) return lst.classList.add("hidden");
    const res=await fetch(`/ajax/buscar-productos/?q=${encodeURIComponent(q)}`);
    const data=await res.json();
    lst.innerHTML="";
    data.forEach(p=>{
      const di=document.createElement("div");
      di.textContent=`${p.reference} - ${p.description}`;
      di.className="p-2 hover:bg-zinc-700 cursor-pointer";
      di.onclick=()=>{
        if(Array.from(document.querySelectorAll(".producto-id"))
                .some(el=>el.value==p.id)) {
          alert("⚠️ Ya agregado"); return;
        }
        e.target.value=di.textContent;
        document.querySelector(`.producto-id[data-index="${idx}"]`).value=p.id;
        lst.classList.add("hidden");
      };
      lst.appendChild(di);
    });
    lst.classList.remove("hidden");
  });

});
</script>

{% endblock %}
